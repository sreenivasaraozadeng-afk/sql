<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>船员档案</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
<div class="page">
    <div class="header-bar">
        <div>
            <h2>船员档案管理</h2>
            <div class="subtitle">船员基础资料、岗位、在岸/出海状态和软删除</div>
        </div>
        <button onclick="openAddModal()">新增船员</button>
    </div>

    <div class="metric-grid">
        <div class="metric"><span>注册船员</span><strong id="statTotal">-</strong></div>
        <div class="metric"><span>出海中</span><strong id="statAtSea">-</strong></div>
    </div>

    <div class="toolbar">
        <div class="field"><label>姓名搜索</label><input id="searchName" oninput="renderPage()" placeholder="输入姓名"></div>
        <div class="field"><label>状态</label><select id="filterStatus" onchange="renderPage()">
            <option value="">全部状态</option>
            <option value="available">在岸可派遣</option>
            <option value="pending">待上船</option>
            <option value="at_sea">出海中</option>
        </select></div>
        <div class="field"><label>岗位</label><select id="filterPosition" onchange="renderPage()">
            <option value="">全部岗位</option>
        </select></div>
        <span class="note" id="resultCount"></span>
    </div>

    <section class="panel">
        <table>
            <thead>
            <tr>
                <th>ID</th><th>账号</th><th>姓名</th><th>性别</th><th>电话</th>
                <th>岗位</th><th>状态</th><th>操作</th>
            </tr>
            </thead>
            <tbody id="crewTableBody"></tbody>
        </table>
    </section>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>新增船员</h3>
        <form id="addCrewForm" class="form-grid">
            <div class="field"><label>账号</label><input id="addUsername" required></div>
            <div class="field"><label>初始密码</label><input id="addPassword" value="123456" required></div>
            <div class="field"><label>姓名</label><input id="addName" required></div>
            <div class="field"><label>性别</label><select id="addGender"><option>男</option><option>女</option></select></div>
            <div class="field"><label>身份证号</label><input id="addIdCard" maxlength="18" required></div>
            <div class="field"><label>联系电话</label><input id="addPhone"></div>
            <div class="field"><label>岗位</label><select id="addPosition"></select></div>
        </form>
        <div class="modal-actions">
            <button class="secondary" onclick="closeAddModal()">取消</button>
            <button onclick="submitAdd()">保存</button>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>编辑船员</h3>
        <form id="editCrewForm" class="form-grid">
            <input type="hidden" id="editId">
            <div class="field"><label>姓名</label><input id="editName" required></div>
            <div class="field"><label>性别</label><select id="editGender"><option>男</option><option>女</option></select></div>
            <div class="field"><label>联系电话</label><input id="editPhone"></div>
            <div class="field"><label>岗位</label><select id="editPosition"></select></div>
        </form>
        <div class="modal-actions">
            <button class="secondary" onclick="closeEditModal()">取消</button>
            <button onclick="submitEdit()">保存修改</button>
        </div>
    </div>
</div>

<script src="common.js"></script>
<script>
requireLogin();
let allCrews = [];
let positions = [];

window.onload = loadAllData;

async function loadAllData() {
    try {
        const statsResult = await apiGet('/api/stats');
        const crewsResult = await apiGet('/api/crews');
        const positionResult = await apiGet('/api/positions');
        document.getElementById('statTotal').textContent = statsResult.data.total;
        document.getElementById('statAtSea').textContent = statsResult.data.at_sea;
        allCrews = crewsResult.data;
        positions = positionResult.data;
        fillPositionOptions();
        renderPage();
    } catch (e) {
        showToast(e.message || '船员数据加载失败', 'error');
    }
}

function fillPositionOptions() {
    const html = positions.map(function(p) {
        return '<option value="' + escapeHtml(p.name) + '">' + escapeHtml(p.name) + '</option>';
    }).join('');
    document.getElementById('addPosition').innerHTML = html;
    document.getElementById('editPosition').innerHTML = html;
    document.getElementById('filterPosition').innerHTML =
        '<option value="">全部岗位</option>' + html;
}

function getFilteredData() {
    const keyword = document.getElementById('searchName').value.trim().toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const position = document.getElementById('filterPosition').value;
    return allCrews.filter(function(item) {
        if (keyword && item.name.toLowerCase().indexOf(keyword) === -1) return false;
        if (status && item.status !== status) return false;
        if (position && item.position !== position) return false;
        return true;
    });
}

function renderPage() {
    const rows = getFilteredData();
    document.getElementById('resultCount').textContent = '共 ' + rows.length + ' 条记录';
    document.getElementById('crewTableBody').innerHTML = rows.map(function(crew) {
        return '<tr><td>' + crew.id + '</td><td>' + escapeHtml(crew.username) +
            '</td><td>' + escapeHtml(crew.name) + '</td><td>' + escapeHtml(crew.gender) +
            '</td><td>' + escapeHtml(crew.phone || '-') + '</td><td>' + escapeHtml(crew.position) +
            '</td><td>' + badge(crew.status) + '</td><td><div class="actions">' +
            '<button class="secondary" onclick="openEditModal(' + crew.id + ')">编辑</button>' +
            '<button class="danger" onclick="deleteCrew(' + crew.id + ')">停用</button>' +
            '</div></td></tr>';
    }).join('') || '<tr><td colspan="8" class="empty">暂无船员数据</td></tr>';
}

function openAddModal() {
    document.getElementById('addModal').style.display = 'flex';
}

function closeAddModal() {
    document.getElementById('addModal').style.display = 'none';
    document.getElementById('addCrewForm').reset();
}

async function submitAdd() {
    const body = {
        username: document.getElementById('addUsername').value,
        password: document.getElementById('addPassword').value,
        name: document.getElementById('addName').value,
        gender: document.getElementById('addGender').value,
        id_card: document.getElementById('addIdCard').value,
        phone: document.getElementById('addPhone').value || null,
        position: document.getElementById('addPosition').value
    };
    try {
        await apiPost('/api/crews', body);
        showToast('船员添加成功');
        closeAddModal();
        loadAllData();
    } catch (e) {
        showToast(e.message || '保存失败', 'error');
    }
}

function openEditModal(id) {
    const crew = allCrews.find(function(item) { return item.id === id; });
    if (!crew) return;
    document.getElementById('editId').value = crew.id;
    document.getElementById('editName').value = crew.name;
    document.getElementById('editGender').value = crew.gender;
    document.getElementById('editPhone').value = crew.phone || '';
    document.getElementById('editPosition').value = crew.position;
    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
}

async function submitEdit() {
    const id = document.getElementById('editId').value;
    const body = {
        name: document.getElementById('editName').value,
        gender: document.getElementById('editGender').value,
        phone: document.getElementById('editPhone').value || null,
        position: document.getElementById('editPosition').value
    };
    try {
        await apiPut('/api/crews/' + id, body);
        showToast('船员更新成功');
        closeEditModal();
        loadAllData();
    } catch (e) {
        showToast(e.message || '更新失败', 'error');
    }
}

async function deleteCrew(id) {
    if (!confirm('确认停用该船员档案吗？')) return;
    try {
        await apiDelete('/api/crews/' + id);
        showToast('船员已停用');
        loadAllData();
    } catch (e) {
        showToast(e.message || '停用失败', 'error');
    }
}
</script>
</body>
</html>
