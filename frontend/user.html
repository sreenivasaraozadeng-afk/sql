<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 出海船员管理系统</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            border-top: 4px solid #1890ff;
        }
        .card h3 { margin-top: 0; color: #333; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 15px; }
        .info-item { font-size: 14px; }
        .info-label { color: #888; margin-bottom: 5px; font-size: 13px; }
        .info-value { font-weight: bold; color: #333; font-size: 16px; }
        .logout-btn {
            padding: 8px 16px;
            background-color: #ff4d4f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .logout-btn:hover { background-color: #d9363e; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🚢 船员个人中心</h2>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <div class="card">
        <h3>👤 我的基本档案</h3>
        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">真实姓名</div>
                <div class="info-value" id="profileName">加载中...</div>
            </div>
            <div class="info-item">
                <div class="info-label">系统登录账号</div>
                <div class="info-value" id="profileUsername">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">联系电话</div>
                <div class="info-value" id="profilePhone">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">性别</div>
                <div class="info-value" id="profileGender">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">身份证号码</div>
                <div class="info-value" id="profileIdCard">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">当前执勤状态</div>
                <div class="info-value" id="profileStatus">-</div>
            </div>
        </div>
    </div>

    <h3 style="color:#333;margin-top:30px;">🌊 我的历史出海记录</h3>
    <table>
        <thead>
            <tr>
                <th>任务流水号</th>
                <th>出发港口</th>
                <th>目的港口</th>
                <th>出发时间</th>
                <th>预计到达时间</th>
                <th>航次状态</th>
            </tr>
        </thead>
        <tbody id="myVoyageTableBody">
            <tr><td colspan="6" style="text-align:center;">正在向服务器拉取记录...</td></tr>
        </tbody>
    </table>
</div>

<script src="common.js"></script>
<script>
var myId = localStorage.getItem('crewId');

if (!myId) {
    alert('🛑 非法访问：您还未登录，请先验证身份！');
    window.location.href = 'index.html';
}

window.onload = function() {
    loadMyProfile();
    loadMyVoyages();
};

async function loadMyProfile() {
    try {
        var result = await apiGet('/api/my-profile/' + myId);
        if (result.success) {
            var p = result.data;
            document.getElementById('profileName').innerText = p.name;
            document.getElementById('profileUsername').innerText = p.username;
            document.getElementById('profilePhone').innerText = p.phone || '未填写';
            document.getElementById('profileGender').innerText = p.gender;
            document.getElementById('profileIdCard').innerText = p.id_card;

            var statusHTML = p.is_at_sea === 1
                ? '<span class="tag-running">🚢 出海中</span>'
                : '<span class="tag-arrived">🏝️ 在岸待命</span>';
            document.getElementById('profileStatus').innerHTML = statusHTML;
        }
    } catch (e) {
        showToast('获取个人资料失败', 'error');
    }
}

async function loadMyVoyages() {
    try {
        var result = await apiGet('/api/my-voyages/' + myId);
        if (result.success) renderTable(result.data);
    } catch (e) {
        showToast('获取航次记录失败', 'error');
    }
}

function renderTable(data) {
    var tbody = document.getElementById('myVoyageTableBody');
    tbody.innerHTML = '';

    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;">暂无历史出海记录</td></tr>';
        return;
    }

    data.forEach(function(v) {
        var statusTag = v.status === '进行中'
            ? '<span class="tag-running">进行中</span>'
            : '<span class="tag-arrived">已抵达</span>';

        var tr = document.createElement('tr');
        tr.innerHTML =
            '<td># ' + v.record_id + '</td>' +
            '<td>' + v.departure_point + '</td>' +
            '<td>' + v.destination_point + '</td>' +
            '<td>' + formatTime(v.departure_time) + '</td>' +
            '<td>' + formatTime(v.expected_arrival_time) + '</td>' +
            '<td>' + statusTag + '</td>';
        tbody.appendChild(tr);
    });
}

function logout() {
    if (confirm('您确定要退出当前账号吗？')) {
        localStorage.clear();
        window.location.href = 'index.html';
    }
}
</script>
</body>
</html>
