<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>船员个人中心</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
<div class="page">
    <div class="header-bar">
        <div>
            <h2>船员个人中心</h2>
            <div class="subtitle">查看个人档案和历史出海记录</div>
        </div>
        <button class="secondary" onclick="logout()">退出登录</button>
    </div>

    <section class="panel">
        <div class="panel-title"><h3>基本档案</h3></div>
        <div class="metric-grid">
            <div class="metric"><span>姓名</span><strong id="profileName">-</strong></div>
            <div class="metric"><span>岗位</span><strong id="profilePosition">-</strong></div>
            <div class="metric"><span>电话</span><strong id="profilePhone">-</strong></div>
            <div class="metric"><span>状态</span><strong id="profileStatus">-</strong></div>
        </div>
    </section>

    <section class="panel">
        <div class="panel-title"><h3>我的海历</h3></div>
        <table>
            <thead><tr><th>ID</th><th>出发港</th><th>目的港</th><th>上船</th><th>下船</th><th>状态</th></tr></thead>
            <tbody id="voyageBody"></tbody>
        </table>
    </section>
</div>

<script src="common.js"></script>
<script>
requireLogin();
const crewId = localStorage.getItem('userId');
window.onload = function() {
    loadProfile();
    loadVoyages();
};

async function loadProfile() {
    try {
        const result = await apiGet('/api/my-profile/' + crewId);
        const p = result.data;
        document.getElementById('profileName').textContent = p.name;
        document.getElementById('profilePosition').textContent = p.position;
        document.getElementById('profilePhone').textContent = p.phone || '-';
        document.getElementById('profileStatus').innerHTML = badge(p.status);
    } catch (e) {
        showToast(e.message || '档案加载失败', 'error');
    }
}

async function loadVoyages() {
    try {
        const result = await apiGet('/api/my-voyages/' + crewId);
        document.getElementById('voyageBody').innerHTML = result.data.map(function(item) {
            return '<tr><td>#' + item.record_id + '</td><td>' + escapeHtml(item.departure_point) +
                '</td><td>' + escapeHtml(item.destination_point) + '</td><td>' +
                formatTime(item.departure_time) + '</td><td>' + formatTime(item.actual_arrival_time) +
                '</td><td>' + escapeHtml(item.status) + '</td></tr>';
        }).join('') || '<tr><td colspan="6" class="empty">暂无出海记录</td></tr>';
    } catch (e) {
        showToast(e.message || '海历加载失败', 'error');
    }
}
</script>
</body>
</html>
