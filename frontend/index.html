<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出海船员管理系统 - 登录</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .login-box {
            width: min(380px, 100%);
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }
        .login-box h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .login-box .subtitle {
            margin-bottom: 22px;
        }
        .login-box .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }
        .login-box button {
            width: 100%;
            margin-top: 8px;
        }
        .demo {
            margin-top: 14px;
            color: var(--muted);
            line-height: 1.7;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h1>出海船员管理系统</h1>
    <div class="subtitle">船员资源调度与证书风控平台</div>
    <div class="field">
        <label for="username">账号</label>
        <input id="username" value="admin" autocomplete="username">
    </div>
    <div class="field">
        <label for="password">密码</label>
        <input id="password" type="password" value="admin123" autocomplete="current-password">
    </div>
    <button onclick="login()">登录</button>
    <div class="demo">
        演示账号：admin/admin123，manager/manager123，cert_admin/cert123，owner/owner123，crew01/123456
    </div>
</div>

<script src="common.js"></script>
<script>
async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) {
        showToast('请输入账号和密码', 'error');
        return;
    }
    try {
        const result = await apiPost('/api/login', { username, password });
        localStorage.setItem('token', result.token);
        localStorage.setItem('userId', result.id);
        localStorage.setItem('username', result.username);
        localStorage.setItem('displayName', result.name);
        localStorage.setItem('role', result.role);
        if (result.role === 'admin') {
            window.location.href = 'admin.html?v=2026052901';
        } else {
            window.location.href = 'user.html?v=2026052901';
        }
    } catch (e) {
        showToast(e.message || '登录失败', 'error');
    }
}
</script>
</body>
</html>
