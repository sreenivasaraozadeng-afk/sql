<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海历记录</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
<div class="page">
    <div class="header-bar">
        <div>
            <h2>海历记录</h2>
            <div class="subtitle">船员上船后自动生成海历，下船后补全实际下船时间</div>
        </div>
        <button onclick="loadVoyages()">刷新</button>
    </div>

    <section class="panel">
        <table>
            <thead>
            <tr>
                <th>海历ID</th><th>船员</th><th>出发港</th><th>目的港</th>
                <th>上船时间</th><th>预计/任务时间</th><th>下船时间</th><th>状态</th>
            </tr>
            </thead>
            <tbody id="voyageBody"></tbody>
        </table>
    </section>
</div>

<script src="common.js"></script>
<script>
requireLogin();
window.onload = loadVoyages;

async function loadVoyages() {
    try {
        const result = await apiGet('/api/voyages');
        document.getElementById('voyageBody').innerHTML = result.data.map(function(item) {
            return '<tr><td>#' + item.record_id + '</td><td>' + escapeHtml(item.crew_name) +
                '</td><td>' + escapeHtml(item.departure_point) + '</td><td>' +
                escapeHtml(item.destination_point) + '</td><td>' + formatTime(item.departure_time) +
                '</td><td>' + formatTime(item.expected_arrival_time) + '</td><td>' +
                formatTime(item.actual_arrival_time) + '</td><td>' +
                '<span class="badge badge-' + (item.status === '进行中' ? 'info' : 'muted') + '">' +
                escapeHtml(item.status) + '</span></td></tr>';
        }).join('') || '<tr><td colspan="8" class="empty">暂无海历记录</td></tr>';
    } catch (e) {
        showToast(e.message || '海历加载失败', 'error');
    }
}
</script>
</body>
</html>
